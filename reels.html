<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reels Archive Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
}

/* Top bar */
.topbar{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  padding:10px;
}

select, input, button{
  padding:10px;
  border-radius:6px;
  border:none;
  font-size:14px;
}

input{
  min-width:150px;
}

button{
  background:#38bdf8;
  cursor:pointer;
}

/* Navigation */
.nav{
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  font-size:26px;
  cursor:pointer;
}

/* Viewer */
#viewer{
  width:100%;
  height:calc(100vh - 110px);
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* Responsive */
@media(max-width:600px){
  #viewer{
    height:calc(100vh - 120px);
  }
  .nav{
    font-size:22px;
  }
}
</style>
</head>

<body>

<!-- Top Controls -->
<div class="topbar">
  <select id="mediaSelect">
    <option value="all">ALL</option>
    <option value="movies">MOVIES</option>
    <option value="audio">AUDIO</option>
    <option value="texts">TEXTS</option>
    <option value="image">IMAGES</option>
    <option value="software">SOFTWARE</option>
    <option value="user">USERNAME</option>
  </select>

  <input type="text" id="searchInput" placeholder="Search..." onkeydown="handleEnter(event)">

  <button onclick="search()">Search</button>

  <button onclick="shareCurrent()">ᯓ➤</button>
</div>

<!-- Navigation -->
<div class="nav">
  <div onclick="prev()">⬅️</div>
  <div onclick="next()">➡️</div>
</div>

<!-- Viewer -->
<div id="viewer"></div>

<script>

let items = [];
let index = 0;
let currentPage = 1;
let loading = false;
let currentQuery = "";

// 🔥 SMART QUERY (USERNAME FIXED)
function buildQuery(){

  const type = document.getElementById("mediaSelect").value;
  const text = document.getElementById("searchInput").value.trim();

  let q = "*:*";

  // 👤 USERNAME SEARCH (FIXED STRONG MATCH)
  if(type === "user" && text){
    q = `(creator:(${text})^5 OR uploader:(${text})^5)`;
  }

  // 🔍 TITLE + FILENAME SEARCH
  else if(text){
    q = `(title:(${text})^6 OR identifier:(${text})^5)`;
  }

  // 🎯 Media filters
  if(type === "movies"){
    q += " AND mediatype:movies";
  }
  else if(type === "audio"){
    q += " AND mediatype:audio";
  }
  else if(type === "texts"){
    q += " AND mediatype:texts";
  }
  else if(type === "image"){
    q += " AND mediatype:image";
  }
  else if(type === "software"){
    q += " AND mediatype:software AND collection:(softwarelibrary OR consolelivingroom OR arcade)";
  }
  else if(type === "all"){
    q += " AND mediatype:(movies OR audio OR texts OR image OR software)";
  }

  return q;
}

// 🚀 Fetch
async function loadItems(){

  if(loading) return;
  loading = true;

  const url = `https://archive.org/advancedsearch.php?q=${encodeURIComponent(currentQuery)}&fl[]=identifier&fl[]=title&sort[]=downloads desc&sort[]=addeddate desc&page=${currentPage}&rows=20&output=json`;

  try{
    const res = await fetch(url);
    const data = await res.json();

    if(data.response && data.response.docs){
      items = items.concat(data.response.docs);
      currentPage++;
    }
  }catch(e){
    console.log(e);
  }

  loading = false;
}

// 🎬 Show item
function showItem(i){

  const item = items[i];
  if(!item) return;

  const id = item.identifier;

  document.getElementById("viewer").innerHTML = `
    <iframe 
      src="https://archive.org/details/${id}"
      allow="autoplay; fullscreen; clipboard-write; encrypted-media; picture-in-picture"
      allowfullscreen>
    </iframe>
  `;

  if(i >= items.length - 5){
    loadItems();
  }
}

// ➡️ Next
function next(){
  if(index < items.length - 1){
    index++;
    showItem(index);
  }
}

// ⬅️ Previous
function prev(){
  if(index > 0){
    index--;
    showItem(index);
  }
}

// 🔍 Search
async function search(){

  const text = document.getElementById("searchInput").value.trim();
  const type = document.getElementById("mediaSelect").value;

  if(!text && type !== "all"){
    alert("Enter search text or select ALL");
    return;
  }

  items = [];
  index = 0;
  currentPage = 1;

  currentQuery = buildQuery();

  await loadItems();

  if(items.length === 0){
    alert("No results found");
    return;
  }

  showItem(0);
}

// ⌨️ Enter key
function handleEnter(e){
  if(e.key === "Enter"){
    search();
  }
}

// 🔗 Share
function shareCurrent(){

  const item = items[index];
  if(!item) return;

  const id = item.identifier;

  const link = `https://yan-1-related-1.github.io/yan-1-website-shared-links-redirecting/archive-identifier-page-shared-links-redirecting.html?identifier=${id}&username=yanshun081`;

  if(navigator.share){
    navigator.share({
      title: "Check this",
      url: link
    });
  } else {
    prompt("Copy link:", link);
  }
}

// 🚀 Init
async function init(){
  currentQuery = buildQuery();
  await loadItems();
  showItem(0);
}

init();

</script>

</body>
</html>
